<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HomeCloud - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style> body { font-family: 'Manrope', sans-serif; } </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden text-gray-800">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col p-4 shadow-sm z-40 hidden md:flex">
        <div class="flex items-center gap-3 px-2 py-4 mb-6">
            <div class="w-10 h-10 rounded-xl bg-[#4f46e5] flex items-center justify-center shadow-md">
                <span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">cloud</span>
            </div>
            <div>
                <h1 class="text-lg font-extrabold text-[#3525cd]">HomeCloud</h1>
                <p class="text-xs text-gray-500">Private LAN Storage</p>
            </div>
        </div>
        <nav class="flex-1 space-y-2">
            <a class="flex items-center gap-3 p-3 bg-[#eff4ff] text-[#3525cd] font-semibold rounded-lg" href="#">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">folder</span> My Files
            </a>
        </nav>
        <div class="mt-auto pt-4 border-t">
            <button onclick="logout()" class="flex items-center gap-3 p-3 w-full text-red-500 hover:bg-red-50 rounded-lg transition-colors font-semibold">
                <span class="material-symbols-outlined">logout</span> Keluar
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen relative w-full">
        
        <header class="flex items-center justify-between px-4 md:px-8 py-4 md:py-5 bg-white border-b shadow-sm w-full">
            
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-[#4f46e5] flex items-center justify-center shadow-md md:hidden">
                    <span class="material-symbols-outlined text-white text-sm" style="font-variation-settings: 'FILL' 1;">cloud</span>
                </div>
                <h2 class="text-xl md:text-2xl font-bold text-gray-800 hidden md:block">Gudang File Lu</h2>
                <h2 class="text-lg font-extrabold text-[#3525cd] block md:hidden">HomeCloud</h2>
            </div>

            <div class="flex items-center gap-2 md:gap-4">
                <input type="file" id="fileInput" class="hidden" />
                
                <button id="btnUpload" class="flex items-center gap-1 md:gap-2 bg-[#4F46E5] text-white px-3 md:px-5 py-2 md:py-2.5 rounded-xl font-semibold hover:bg-[#3525cd] transition-all shadow-md text-sm md:text-base">
                    <span class="material-symbols-outlined text-[18px] md:text-[20px]">add</span> 
                    <span class="hidden sm:inline">Upload File</span>
                    <span class="inline sm:hidden">Upload</span>
                </button>
                
                <button onclick="logout()" class="flex md:hidden items-center justify-center p-2 text-red-500 bg-red-50 rounded-xl hover:bg-red-100 transition-colors">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 w-full">
            <div id="fileContainer" class="grid grid-cols-1 gap-4">
                </div>
        </div>
    </main>

    <script>
        // Fungsi buat hapus tiket dan balik ke login
        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="dashboard.js"></script> 
</body>
</html>
