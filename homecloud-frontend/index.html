<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HomeCloud - Masuk</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-[#eff4ff] min-h-screen flex items-center justify-center p-6 text-[#0b1c30]">

    <main class="w-full max-w-md">
        <div class="text-center mb-8 flex flex-col items-center">
            <div class="w-16 h-16 bg-white rounded-full shadow-md flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-[#3525cd] text-3xl" style="font-variation-settings: 'FILL' 1;">cloud</span>
            </div>
            <h1 class="text-3xl font-bold mb-2" id="formTitle">Welcome to HomeCloud</h1>
            <p class="text-[#464555]" id="formSubtitle">Login buat masuk ke gudang lu.</p>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-8 border border-gray-100">
            <form id="authForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold mb-2" for="username">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-gray-400">person</span>
                        </div>
                        <input class="block w-full pl-10 pr-3 py-3 bg-gray-50 border-none rounded-lg focus:ring-2 focus:ring-[#3525cd] transition-colors" id="username" type="text" placeholder="Masukkan username lu" required/>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" for="password">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-gray-400">lock</span>
                        </div>
                        <input class="block w-full pl-10 pr-3 py-3 bg-gray-50 border-none rounded-lg focus:ring-2 focus:ring-[#3525cd] transition-colors" id="password" type="password" placeholder="••••••••" required/>
                    </div>
                </div>

                <div class="pt-2">
                    <button id="submitBtn" type="submit" class="w-full flex justify-center py-3 px-4 rounded-lg text-white bg-[#4f46e5] hover:bg-[#3525cd] transition-colors font-semibold shadow-md">
                        Login Sekarang
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center border-t pt-6">
                <p class="text-[#464555]" id="toggleText">
                    Belom punya akun? 
                    <button id="toggleBtn" class="font-bold text-[#3525cd] hover:underline ml-1">Register di mari</button>
                </p>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="script.js"></script>
</body>
</html>
